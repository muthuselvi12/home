<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <link rel="stylesheet" href="./signin.css" />
    <link rel="icon" href="../assets/kk pic.webp" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="main">
    <main>
      <div class="bg">
        <div class="div">
          <h1>LOGIN</h1>

          <div>
            <form action="" method="">
              <div class="content">
                <input
                  type="email"
                  name="Email address"
                  placeholder="Email address"
                />
              </div>
              <br />
              <div class="content">
                <input type="password" name="password" placeholder="password" />
              </div>
              <br />
              <div class="gap">
                <label style="color: blue">Forgot Password?</label>
              </div>
              <!-- <br /> -->
              <div class="send">
                <button type="button" onclick="sign()">login</button>
              </div>
              <br />
              <div class="gap">
                <p style="color: aliceblue">
                  New account?
                  <span>
                    <a href="./register.html" style="color: rgb(255, 210, 31)"
                      >Register
                    </a>
                  </span>
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script src="./sigin.js"></script>
  </body>
</html>
